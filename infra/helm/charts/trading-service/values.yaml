serviceName: trading-service
image:
  repository: ghcr.io/example/trading-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  SPRING_PROFILES_ACTIVE: paper
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092

secretEnv:
  DB_PASSWORD: change-me

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

# Internal QA automation API — disabled by default; enable only in dedicated QA environments
qa:
  api:
    enabled: false
