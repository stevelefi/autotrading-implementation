serviceName: trading-service
image:
  repository: ghcr.io/stevelefi/autotrading-implementation
  tag: latest
  digest: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  SPRING_PROFILES_ACTIVE: paper
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092

secretEnv:
  DB_PASSWORD: change-me

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

qa:
  api:
    enabled: true
