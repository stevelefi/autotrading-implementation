global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: ingress-gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ingress-gateway-service:8080"]
        labels:
          service: ingress-gateway-service

  - job_name: risk-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["risk-service:8080"]
        labels:
          service: risk-service

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["order-service:8080"]
        labels:
          service: order-service

  - job_name: ibkr-connector-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ibkr-connector-service:8080"]
        labels:
          service: ibkr-connector-service

  - job_name: event-processor-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["event-processor-service:8080"]
        labels:
          service: event-processor-service

  - job_name: agent-runtime-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["agent-runtime-service:8080"]
        labels:
          service: agent-runtime-service

  - job_name: performance-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["performance-service:8080"]
        labels:
          service: performance-service

  - job_name: monitoring-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["monitoring-api:8080"]
        labels:
          service: monitoring-api
