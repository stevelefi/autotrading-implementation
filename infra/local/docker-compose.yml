      otel-collector:
        condition: service_started
    ports:
      - "18081:8080"
      - "19091:9091"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null"]
      interval: 10s
