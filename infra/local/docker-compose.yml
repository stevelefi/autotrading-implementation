services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.1.8
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:${KAFKA_PORT},OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:${KAFKA_PORT},OUTSIDE://localhost:${KAFKA_PORT}
    ports:
      - "${KAFKA_PORT}:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q Healthy"]
      interval: 15s
      timeout: 10s
      retries: 10

  redpanda-console:
    image: redpandadata/console:v2.8.10
    environment:
      KAFKA_BROKERS: redpanda:${KAFKA_PORT}
    ports:
      - "${REDPANDA_CONSOLE_PORT}:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.118.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ../observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT}:4317"
      - "${OTEL_HTTP_PORT}:4318"

  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    depends_on:
      otel-collector:
        condition: service_started

  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ../observability/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT}:3100"

  promtail:
    image: grafana/promtail:3.3.2
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ../observability/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started

  ibkr-simulator:
    image: wiremock/wiremock:3.13.2
    command: ["--global-response-templating", "--verbose"]
    ports:
      - "${IBKR_SIM_PORT}:8080"

  ibkr-connector-service:
    build:
      context: ../..
      dockerfile: services/ibkr-connector-service/Dockerfile
    environment:
      SERVER_PORT: 8080
      GRPC_SERVER_PORT: 9093
      IBKR_MODE: SIMULATOR
      IBKR_SIMULATOR_BASE_URL: http://ibkr-simulator:8080
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      OTEL_SERVICE_NAME: ibkr-connector-service
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      JAVA_TOOL_OPTIONS: -javaagent:/otel/opentelemetry-javaagent.jar
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      ibkr-simulator:
        condition: service_started
      otel-collector:
        condition: service_started
    ports:
      - "18083:8080"
      - "19093:9093"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  order-service:
    build:
      context: ../..
      dockerfile: services/order-service/Dockerfile
    environment:
      SERVER_PORT: 8080
      GRPC_SERVER_PORT: 9092
      BROKER_GRPC_HOST: ibkr-connector-service
      BROKER_GRPC_PORT: 9093
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      OTEL_SERVICE_NAME: order-service
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      JAVA_TOOL_OPTIONS: -javaagent:/otel/opentelemetry-javaagent.jar
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      ibkr-connector-service:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "18082:8080"
      - "19092:9092"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  risk-service:
