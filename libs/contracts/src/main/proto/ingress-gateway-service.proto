syntax = "proto3";

package autotrading.ingress.v1;

option java_package = "com.autotrading.ingress.v1";
option java_multiple_files = true;

service IngressService {
  rpc PublishEvent(PublishEventRequest) returns (AcceptedResponse);
}

message PublishEventRequest {
  string request_id = 1;
  string client_event_id = 2;
  string event_intent = 3;
  string agent_id = 4;
  string integration_id = 5;
  string source_event_id = 6;
  string occurred_at = 7;
  string payload_json = 8;
}

message AcceptedResponse {
  string event_id = 1;
  bool accepted = 2;
  string received_at = 3;
  string status = 4;
}
