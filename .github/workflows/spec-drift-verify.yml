name: spec-drift-verify

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify pinned spec snapshot
        run: |
          python tools/spec_sync.py verify --dest specs/vendor --version-file SPEC_VERSION.json
