name: spec-drift-verify

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify-spec:
    runs-on: ubuntu-latest
    env:
      SPEC_REPO_PAT: ${{ secrets.SPEC_REPO_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync pinned spec snapshot (if token available)
        run: |
          if [ -z "${SPEC_REPO_PAT:-}" ]; then
            echo "SPEC_REPO_PAT not configured; skipping remote sync in CI."
            exit 0
          fi

          repo_url=$(python -c 'import json; print(json.load(open("SPEC_VERSION.json", "r", encoding="utf-8"))["repo_url"])')
          ref=$(python -c 'import json; print(json.load(open("SPEC_VERSION.json", "r", encoding="utf-8"))["ref"])')

          if [[ "$repo_url" == https://github.com/* ]]; then
            repo_url="${repo_url/https:\/\/github.com\//https:\/\/x-access-token:${SPEC_REPO_PAT}@github.com/}"
          fi

          python tools/spec_sync.py sync --repo-url "$repo_url" --ref "$ref" --dest specs/vendor --version-file SPEC_VERSION.json

      - name: Verify pinned spec snapshot
        run: |
          if [ -f specs/vendor/.spec-manifest.json ]; then
            python tools/spec_sync.py verify --dest specs/vendor --version-file SPEC_VERSION.json
          else
            python -c 'import json; v=json.load(open("SPEC_VERSION.json", "r", encoding="utf-8")); missing=[k for k in ("repo_url", "ref", "dest") if not v.get(k)]; assert not missing, f"spec verify failed: missing keys in SPEC_VERSION.json: {missing}"; assert v["dest"] == "specs/vendor", f"spec verify failed: expected dest=specs/vendor, found {v["dest"]}"; print("spec verify passed (pin-only mode; no synced artifacts present in CI)")'
          fi
