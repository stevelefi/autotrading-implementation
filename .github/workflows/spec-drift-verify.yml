name: spec-drift-verify

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify-spec:
    runs-on: ubuntu-latest
    env:
      SPEC_REPO_PAT: ${{ secrets.SPEC_REPO_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync pinned spec snapshot (if token available)
        run: |
          if [ -z "${SPEC_REPO_PAT:-}" ]; then
            echo "SPEC_REPO_PAT not configured; skipping remote sync in CI."
            exit 0
          fi

          python - <<'PY'
import json
import os
import subprocess

with open("SPEC_VERSION.json", "r", encoding="utf-8") as f:
    v = json.load(f)

repo_url = v["repo_url"]
if repo_url.startswith("https://github.com/"):
    repo_url = repo_url.replace(
        "https://github.com/",
        f"https://x-access-token:{os.environ['SPEC_REPO_PAT']}@github.com/",
        1,
    )

subprocess.run(
    [
        "python",
        "tools/spec_sync.py",
        "sync",
        "--repo-url",
        repo_url,
        "--ref",
        v["ref"],
        "--dest",
        "specs/vendor",
        "--version-file",
        "SPEC_VERSION.json",
    ],
    check=True,
)
PY

      - name: Verify pinned spec snapshot
        run: |
          if [ -f specs/vendor/.spec-manifest.json ]; then
            python tools/spec_sync.py verify --dest specs/vendor --version-file SPEC_VERSION.json
          else
            python - <<'PY'
import json

with open("SPEC_VERSION.json", "r", encoding="utf-8") as f:
    v = json.load(f)

required = ["repo_url", "ref", "dest"]
missing = [k for k in required if not v.get(k)]
if missing:
    raise SystemExit(f"spec verify failed: missing keys in SPEC_VERSION.json: {missing}")
if v["dest"] != "specs/vendor":
    raise SystemExit(
        f"spec verify failed: expected dest=specs/vendor, found {v['dest']}"
    )

print("spec verify passed (pin-only mode; no synced artifacts present in CI)")
PY
          fi
