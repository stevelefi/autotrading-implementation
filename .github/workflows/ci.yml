name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-spec:
    name: Verify spec pin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install spec-sync deps
        run: pip install requests

      - name: Verify pinned spec
        run: python tools/spec_sync.py verify --dest specs/vendor --version-file SPEC_VERSION.json

  build-and-test:
    name: Build & unit test
    runs-on: ubuntu-latest
    needs: verify-spec
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build and run unit tests
        run: mvn -B -DskipITs=true test

  build-libs:
    name: Build shared libraries
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build reliability-core + contracts
        run: mvn -B -pl libs/reliability-core,libs/contracts -am install -DskipTests

  coverage-core:
    name: Coverage (core libs)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run coverage on core modules
        run: |
          mvn -B -Pcoverage-core \
            -pl libs/reliability-core,services/ingress-gateway-service,services/risk-service,services/order-service,services/ibkr-connector-service \
            -am verify

      - name: Upload Surefire + JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/site/jacoco/
          retention-days: 14

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      - name: Lint Helm chart
        run: helm lint infra/helm/charts/trading-service

      - name: Render Helm templates
        run: helm template trading-service infra/helm/charts/trading-service -f infra/helm/charts/trading-service/values.yaml
