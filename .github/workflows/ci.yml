name: ci

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Unit and integration tests
        run: mvn -B test

      - name: Migration apply check
        run: mvn -B -pl tests/e2e -am -Dtest=FlywayMigrationTest -Dsurefire.failIfNoSpecifiedTests=false test

      - name: Compose smoke (synthetic ingress path)
        run: mvn -B -pl tests/e2e -am -Dtest=VerticalSliceGrpcFlowTest -Dsurefire.failIfNoSpecifiedTests=false test

      - name: Sync + verify pinned spec snapshot
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${GITHUB_TOKEN:-}" ]; then
            git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          cfg = json.loads(Path("SPEC_VERSION.json").read_text(encoding="utf-8"))
          subprocess.check_call([
              "python3",
              "tools/spec_sync.py",
              "sync",
              "--repo-url", cfg["repo_url"],
              "--ref", cfg["ref"],
              "--dest", cfg["dest"],
              "--version-file", "SPEC_VERSION.json",
          ])
          subprocess.check_call([
              "python3",
              "tools/spec_sync.py",
              "verify",
              "--dest", cfg["dest"],
              "--version-file", "SPEC_VERSION.json",
          ])
          PY
