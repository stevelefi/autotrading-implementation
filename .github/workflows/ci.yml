name: ci

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Unit and integration tests
        run: mvn -B test

      - name: Migration apply check
        run: mvn -B -pl tests/e2e -Dtest=FlywayMigrationTest test

      - name: Compose smoke (synthetic ingress path)
        run: mvn -B -pl tests/e2e -Dtest=VerticalSliceGrpcFlowTest test

      - name: Verify pinned spec snapshot
        run: python3 tools/spec_sync.py verify --dest specs/vendor --version-file SPEC_VERSION.json
