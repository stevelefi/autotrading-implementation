name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ── Required branch-protection checks (no-op — managed locally) ────────────
  # verify-spec: spec sync is a local-only gate (make verify-spec / make pre-commit).
  #   specs/vendor/ is gitignored and never committed. Not a CI concern.
  # pr-governance: governance checks run locally via pre-commit + PR template.
  verify-spec:
    name: Verify spec pin
    runs-on: ubuntu-latest
    steps:
      - run: echo "Spec sync is enforced locally via make verify-spec. Skipped in CI."

  pr-governance:
    name: PR governance
    runs-on: ubuntu-latest
    steps:
      - run: echo "PR governance is enforced via PR template and local pre-commit. Skipped in CI."

  # ── Java: build + test + coverage — single job, single Maven cache restore ──
  # Consolidating build-and-test / build-libs / coverage-core into one job
  # eliminates 2 extra runner startups and 2 extra cache restorations per run.
  build:
    name: Build & unit test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          # cache key is auto-derived from **/pom.xml hashes by setup-java

      - name: Build all modules + unit tests
        run: mvn -B -DskipITs=true test

      - name: Build shared libraries
        run: mvn -B -pl libs/reliability-core,libs/contracts -am install -DskipTests

      - name: Coverage — core modules
        run: |
          mvn -B -Pcoverage-core \
            -pl libs/reliability-core,services/ingress-gateway-service,services/risk-service,services/order-service,services/ibkr-connector-service \
            -am verify

      - name: Upload Surefire + JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/site/jacoco/
          retention-days: 7

  # ── Helm: no JDK needed — keep separate to avoid pulling Maven deps ─────────
  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      - name: Lint Helm chart
        run: helm lint infra/helm/charts/trading-service

      - name: Render Helm templates
        run: helm template trading-service infra/helm/charts/trading-service -f infra/helm/charts/trading-service/values.yaml
