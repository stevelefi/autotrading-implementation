name: nightly-compose-smoke

on:
  schedule:
    - cron: "0 4 * * *"  # 04:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify spec pin
        run: |
          if [ -f specs/vendor/.spec-manifest.json ]; then
            python tools/spec_sync.py verify --dest specs/vendor --version-file SPEC_VERSION.json
          else
            python -c '
import json
v = json.load(open("SPEC_VERSION.json"))
missing = [k for k in ("repo_url", "ref", "dest") if not v.get(k)]
assert not missing, f"spec verify failed: missing keys: {missing}"
assert v["dest"] == "specs/vendor"
print("spec verify passed (pin-only mode)")
'
          fi

      - name: Bring up local stack
        run: make up

      - name: Run smoke suite
        run: make smoke-local

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-evidence-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            reports/blitz/e2e-results/smoke-local-*.md
            reports/blitz/drill-logs/smoke-local-*.json
            reports/blitz/observability-results/*.json
            reports/blitz/observability-results/*.log

      - name: Tear down local stack
        if: always()
        run: make down
