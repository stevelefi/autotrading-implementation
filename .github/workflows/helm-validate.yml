name: helm-validate

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint infra/helm/charts/trading-service

      - name: Helm template (paper profile)
        run: helm template trading-service infra/helm/charts/trading-service -f infra/helm/charts/trading-service/values.yaml >/tmp/helm-rendered.yaml
