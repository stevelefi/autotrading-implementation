name: pr-governance

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  pr-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch naming
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          echo "head_ref=${HEAD_REF}"
          if ! echo "$HEAD_REF" | grep -Eq '^(feat|fix|chore|refactor|docs|test|ci|hotfix|release|codex)/.+'; then
            echo "Branch name must match <type>/<description>"
            echo "Allowed types: feat, fix, chore, refactor, docs, test, ci, hotfix, release, codex"
            exit 1
          fi
