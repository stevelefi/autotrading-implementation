name: agent-status

on:
  pull_request:
    types: [opened, labeled, closed]
  issues:
    types: [closed]
  workflow_run:
    workflows: ["ci"]
    types: [completed]
  workflow_dispatch:
    inputs:
      work_item_id:
        description: "Issue or PR number"
        required: true
        type: string
      status:
        description: "Status"
        required: true
        type: choice
        options: [STARTED, IN_PROGRESS, BLOCKED, DONE]
      summary:
        description: "Short summary"
        required: true
        type: string
      url:
        description: "Issue/PR URL"
        required: true
        type: string
      severity:
        description: "Optional severity"
        required: false
        default: ""
        type: string
      environment:
        description: "Optional environment"
        required: false
        default: ""
        type: string
      spec_ref:
        description: "Optional spec ref"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pr-opened:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    uses: stevelefi/autotrading-devops/.github/workflows/slack-agent-status-reusable.yml@main
    secrets: inherit
    with:
      repo: ${{ github.repository }}
      work_item_id: ${{ github.event.pull_request.number }}
      agent_name: ${{ github.actor }}
      status: STARTED
      summary: ${{ github.event.pull_request.title }}
      url: ${{ github.event.pull_request.html_url }}

  pr-labeled-blocked:
    if: github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'blocked'
    uses: stevelefi/autotrading-devops/.github/workflows/slack-agent-status-reusable.yml@main
    secrets: inherit
    with:
      repo: ${{ github.repository }}
      work_item_id: ${{ github.event.pull_request.number }}
      agent_name: ${{ github.actor }}
      status: BLOCKED
      summary: PR labeled blocked
      url: ${{ github.event.pull_request.html_url }}
      severity: P1

  pr-merged-done:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    uses: stevelefi/autotrading-devops/.github/workflows/slack-agent-status-reusable.yml@main
    secrets: inherit
    with:
      repo: ${{ github.repository }}
      work_item_id: ${{ github.event.pull_request.number }}
      agent_name: ${{ github.actor }}
      status: DONE
      summary: PR merged
      url: ${{ github.event.pull_request.html_url }}

  issue-closed-done:
    if: github.event_name == 'issues' && github.event.action == 'closed' && github.event.issue.pull_request == null
    uses: stevelefi/autotrading-devops/.github/workflows/slack-agent-status-reusable.yml@main
    secrets: inherit
    with:
      repo: ${{ github.repository }}
      work_item_id: ${{ github.event.issue.number }}
      agent_name: ${{ github.actor }}
      status: DONE
      summary: Issue closed
      url: ${{ github.event.issue.html_url }}

  ci-failed-blocked:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.pull_requests[0] != null
    uses: stevelefi/autotrading-devops/.github/workflows/slack-agent-status-reusable.yml@main
    secrets: inherit
    with:
      repo: ${{ github.repository }}
      work_item_id: ${{ github.event.workflow_run.pull_requests[0].number }}
      agent_name: ${{ github.actor }}
      status: BLOCKED
      summary: CI failed - ${{ github.event.workflow_run.name }}
      url: ${{ github.event.workflow_run.html_url }}
      severity: P1

  manual-status:
    if: github.event_name == 'workflow_dispatch'
    uses: stevelefi/autotrading-devops/.github/workflows/slack-agent-status-reusable.yml@main
    secrets: inherit
    with:
      repo: ${{ github.repository }}
      work_item_id: ${{ inputs.work_item_id }}
      agent_name: ${{ github.actor }}
      status: ${{ inputs.status }}
      summary: ${{ inputs.summary }}
      url: ${{ inputs.url }}
      severity: ${{ inputs.severity }}
      environment: ${{ inputs.environment }}
      spec_ref: ${{ inputs.spec_ref }}
