<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 10; ry: 10; }
      .title { font: bold 20px Arial, sans-serif; fill: #111827; }
      .txt { font: 14px Arial, sans-serif; fill: #111827; }
      .db { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; }
      .stream { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; }
      .line { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>

  <text x="30" y="35" class="title">Broker-Integrated Trading Platform Architecture</text>

  <rect class="box" x="40" y="90" width="200" height="70"/>
  <text x="45" y="130" class="txt">agent-runtime-service</text>

  <rect class="box" x="280" y="90" width="160" height="70"/>
  <text x="330" y="130" class="txt">risk-service</text>

  <rect class="box" x="480" y="90" width="170" height="70"/>
  <text x="530" y="130" class="txt">order-service</text>

  <rect class="box" x="690" y="90" width="220" height="70"/>
  <text x="725" y="130" class="txt">ibkr-connector-service</text>

  <rect class="box" x="950" y="90" width="180" height="70"/>
  <text x="985" y="130" class="txt">performance-service</text>

  <rect class="box" x="1170" y="90" width="170" height="70"/>
  <text x="1200" y="130" class="txt">monitoring-api</text>

  <rect class="box" x="1170" y="220" width="170" height="70"/>
  <text x="1215" y="260" class="txt">dashboard-ui</text>

  <rect class="db" x="420" y="320" width="220" height="90"/>
  <text x="495" y="370" class="txt">PostgreSQL</text>

  <rect class="stream" x="700" y="320" width="220" height="90"/>
  <text x="775" y="370" class="txt">Kafka</text>

  <rect class="box" x="280" y="220" width="160" height="70"/>
  <text x="320" y="260" class="txt">opa-sidecar</text>

  <rect class="box" x="280" y="430" width="160" height="70"/>
  <text x="294" y="470" class="txt">Policy Bundles</text>

  <line class="line" x1="240" y1="125" x2="280" y2="125"/>
  <line class="line" x1="440" y1="125" x2="480" y2="125"/>
  <line class="line" x1="650" y1="125" x2="690" y2="125"/>
  <line class="line" x1="910" y1="125" x2="950" y2="125"/>
  <line class="line" x1="1130" y1="125" x2="1170" y2="125"/>

  <line class="line" x1="360" y1="160" x2="360" y2="220"/>
  <line class="line" x1="360" y1="290" x2="360" y2="430"/>

  <line class="line" x1="530" y1="160" x2="530" y2="320"/>
  <line class="line" x1="800" y1="160" x2="800" y2="320"/>

  <line class="line" x1="1255" y1="160" x2="1255" y2="220"/>
</svg>
