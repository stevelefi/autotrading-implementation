openapi: 3.1.0
info:
  title: Monitoring API (Broker-Integrated Trading Platform)
  version: 1.0.0
  description: |
    Canonical operator-facing API contract for `monitoring-api`.
    This specification matches `docs/API_SPEC.md` and `docs/contracts/monitoring-api.md`.
  license:
    name: Proprietary - Internal Use
    identifier: LicenseRef-Proprietary-Internal
servers:
  - url: /
    description: Relative server base
security:
  - bearerAuth: []
tags:
  - name: Agents
    description: Agent lifecycle, configuration, and performance query endpoints.
  - name: Trade Intake
    description: Deprecated compatibility intake endpoints that forward to ingress-gateway-service.
  - name: System
    description: Platform-wide health and control endpoints.
  - name: Reconciliation
    description: Consistency recovery and order-level reconciliation endpoints.
  - name: Instruments
    description: Supported instrument catalog and status endpoints.
  - name: Streaming
    description: Real-time SSE feed for dashboard consumers.
paths:
  /api/v1/agents:
    post:
      tags: [Agents]
      summary: Create agent configuration
      operationId: createAgent
      parameters:
        - $ref: '#/components/parameters/XActorId'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreateRequest'
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAgentResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/agents/{agentId}:
    get:
      tags: [Agents]
      summary: Get one agent
      operationId: getAgent
      parameters:
        - $ref: '#/components/parameters/AgentIdPath'
      responses:
        '200':
          description: Agent returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAgentResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/agents/{agentId}/status:
    put:
      tags: [Agents]
      summary: Update agent status
      operationId: updateAgentStatus
      parameters:
        - $ref: '#/components/parameters/AgentIdPath'
        - $ref: '#/components/parameters/XActorId'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentStatusUpdateRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAgentResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/agents/{agentId}/config:
    put:
      tags: [Agents]
      summary: Update agent risk/execution config
      operationId: updateAgentConfig
      parameters:
        - $ref: '#/components/parameters/AgentIdPath'
        - $ref: '#/components/parameters/XActorId'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentConfigUpdateRequest'
      responses:
        '200':
          description: Config updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAgentResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/agents/{agentId}/positions:
    get:
      tags: [Agents]
      summary: Get current positions for an agent
      operationId: getAgentPositions
      parameters:
        - $ref: '#/components/parameters/AgentIdPath'
      responses:
        '200':
          description: Position returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPositionsResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/agents/{agentId}/orders:
    get:
      tags: [Agents]
      summary: Get paginated order timeline
      operationId: getAgentOrders
      parameters:
        - $ref: '#/components/parameters/AgentIdPath'
        - $ref: '#/components/parameters/FromQuery'
        - $ref: '#/components/parameters/ToQuery'
        - $ref: '#/components/parameters/StatusQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: Orders returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOrdersResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/agents/{agentId}/performance:
    get:
      tags: [Agents]
      summary: Get performance metrics and snapshots
      operationId: getAgentPerformance
      parameters:
        - $ref: '#/components/parameters/AgentIdPath'
        - $ref: '#/components/parameters/FromQuery'
        - $ref: '#/components/parameters/ToQuery'
      responses:
        '200':
          description: Performance returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPerformanceResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/trade-events/manual:
    post:
      tags: [Trade Intake]
      summary: Compatibility intake for manual trader-triggered trade event
      description: Deprecated compatibility endpoint. Validates request and forwards to ingress-gateway-service.
      deprecated: true
      operationId: createManualTradeEvent
      parameters:
        - $ref: '#/components/parameters/XActorId'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualTradeEventRequest'
      responses:
        '202':
          description: Trade event accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeEventIntakeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/trade-events/external:
    post:
      tags: [Trade Intake]
      summary: Compatibility intake for external integration trade event
      description: Deprecated compatibility endpoint. Validates request and forwards to ingress-gateway-service.
      deprecated: true
      operationId: createExternalTradeEvent
      parameters:
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExternalTradeEventRequest'
      responses:
        '202':
          description: Trade event accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeEventIntakeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/system/health:
    get:
      tags: [System]
      summary: Get system/dependency health
      operationId: getSystemHealth
      responses:
        '200':
          description: Health returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemHealthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/Unavailable'

  /api/v1/system/consistency-status:
    get:
      tags: [System]
      summary: Get consistency status indicators
      operationId: getConsistencyStatus
      responses:
        '200':
          description: Consistency status returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsistencyStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/Unavailable'

  /api/v1/system/kill-switch:
    post:
      tags: [System]
      summary: Enable or disable kill switch (admin)
      operationId: setKillSwitch
      parameters:
        - $ref: '#/components/parameters/XActorId'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KillSwitchRequest'
      responses:
        '200':
          description: Kill switch updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KillSwitchResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/system/trading-mode:
    post:
      tags: [System]
      summary: Set trading mode (admin)
      operationId: setTradingMode
      parameters:
        - $ref: '#/components/parameters/XActorId'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TradingModeRequest'
      responses:
        '200':
          description: Trading mode updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradingModeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/system/reconciliation/start:
    post:
      tags: [Reconciliation]
      summary: Start reconciliation
      operationId: startReconciliation
      parameters:
        - $ref: '#/components/parameters/XActorId'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconciliationStartRequest'
      responses:
        '202':
          description: Reconciliation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationStartResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/system/reconciliation/{runId}:
    get:
      tags: [Reconciliation]
      summary: Get reconciliation run status
      operationId: getReconciliationRun
      parameters:
        - $ref: '#/components/parameters/RunIdPath'
      responses:
        '200':
          description: Reconciliation run returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/system/reconciliation/{runId}/ack-resume:
    post:
      tags: [Reconciliation]
      summary: Acknowledge and resume from freeze (admin)
      operationId: ackResume
      parameters:
        - $ref: '#/components/parameters/RunIdPath'
        - $ref: '#/components/parameters/XActorId'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AckResumeRequest'
      responses:
        '200':
          description: Resume acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradingModeResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/orders/{orderIntentId}/consistency:
    get:
      tags: [Reconciliation]
      summary: Get order-level consistency details
      operationId: getOrderConsistency
      parameters:
        - $ref: '#/components/parameters/OrderIntentIdPath'
      responses:
        '200':
          description: Consistency details returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderConsistencyResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/instruments:
    post:
      tags: [Instruments]
      summary: Create an instrument
      operationId: createInstrument
      parameters:
        - $ref: '#/components/parameters/XActorId'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstrumentCreateRequest'
      responses:
        '201':
          description: Instrument created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstrumentResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

    get:
      tags: [Instruments]
      summary: List instruments
      operationId: listInstruments
      parameters:
        - $ref: '#/components/parameters/AssetTypeQuery'
        - $ref: '#/components/parameters/InstrumentStatusQuery'
        - $ref: '#/components/parameters/SymbolQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: Instruments listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstrumentsResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/instruments/{instrumentId}/status:
    put:
      tags: [Instruments]
      summary: Update instrument status
      operationId: updateInstrumentStatus
      parameters:
        - $ref: '#/components/parameters/InstrumentIdPath'
        - $ref: '#/components/parameters/XActorId'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstrumentStatusUpdateRequest'
      responses:
        '200':
          description: Instrument status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstrumentResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/instruments/{instrumentId}/active-contract:
    get:
      tags: [Instruments]
      summary: Get active contract mapping
      operationId: getActiveContract
      parameters:
        - $ref: '#/components/parameters/InstrumentIdPath'
      responses:
        '200':
          description: Active contract returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveContractResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/stream/events:
    get:
      tags: [Streaming]
      summary: Stream dashboard events via SSE
      operationId: streamEvents
      parameters:
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: string
          description: Replay hint for reconnect.
      responses:
        '200':
          description: Event stream
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: order.status
                  id: evt-2001
                  data: {"trace_id":"trc-1","agent_id":"agent_momo_01"}
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AgentIdPath:
      name: agentId
      in: path
      required: true
      schema:
        type: string
    RunIdPath:
      name: runId
      in: path
      required: true
      schema:
        type: string
    OrderIntentIdPath:
      name: orderIntentId
      in: path
      required: true
      schema:
        type: string
    InstrumentIdPath:
      name: instrumentId
      in: path
      required: true
      schema:
        type: string
    XActorId:
      name: X-Actor-Id
      in: header
      required: true
      schema:
        type: string
    XRequestId:
      name: X-Request-Id
      in: header
      required: true
      schema:
        type: string
    FromQuery:
      name: from
      in: query
      required: false
      schema:
        type: string
        format: date-time
    ToQuery:
      name: to
      in: query
      required: false
      schema:
        type: string
        format: date-time
    StatusQuery:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/OrderStatus'
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    SizeQuery:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
    AssetTypeQuery:
      name: asset_type
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AssetType'
    InstrumentStatusQuery:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/InstrumentStatus'
    SymbolQuery:
      name: symbol
      in: query
      required: false
      schema:
        type: string

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid auth
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Insufficient role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Conflict or state mismatch
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unavailable:
      description: Dependency unavailable or degraded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    AgentStatus:
      type: string
      enum: [ACTIVE, PAUSED, STOPPED]
    OrderStatus:
      type: string
      enum: [CREATED, APPROVED, SUBMITTED, PARTIALLY_FILLED, FILLED, CANCELED, REJECTED, FAILED, UNKNOWN_PENDING_RECON]
    AssetType:
      type: string
      enum: [STK, FUT]
    InstrumentStatus:
      type: string
      enum: [ACTIVE, INACTIVE]

    ErrorEnvelope:
      type: object
      required: [trace_id, error]
      properties:
        trace_id:
          type: string
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    Agent:
      type: object
      required: [agent_id, name, status, strategy_type]
      properties:
        agent_id:
          type: string
        name:
          type: string
        status:
          $ref: '#/components/schemas/AgentStatus'
        strategy_type:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentCreateRequest:
      type: object
      required: [agent_id, name, status, strategy_type, risk_profile]
      properties:
        agent_id:
          type: string
        name:
          type: string
        status:
          $ref: '#/components/schemas/AgentStatus'
        strategy_type:
          type: string
        risk_profile:
          $ref: '#/components/schemas/AgentRiskProfile'

    AgentRiskProfile:
      type: object
      required: [max_order_qty, max_net_position, max_trades_per_day, max_daily_loss, cooldown_seconds]
      properties:
        max_order_qty:
          type: integer
          minimum: 1
          maximum: 100
        max_net_position:
          type: integer
          minimum: 1
          maximum: 100
        max_trades_per_day:
          type: integer
          minimum: 1
        max_daily_loss:
          type: number
        cooldown_seconds:
          type: integer
          minimum: 0

    AgentStatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/AgentStatus'
        reason:
          type: string

    AgentConfigUpdateRequest:
      type: object
      required: [risk_profile]
      properties:
        risk_profile:
          $ref: '#/components/schemas/AgentRiskProfile'

    CreateAgentResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          $ref: '#/components/schemas/Agent'

    GetAgentResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          $ref: '#/components/schemas/Agent'

    PositionView:
      type: object
      required: [agent_id, symbol, net_qty, avg_cost, realized_pnl, unrealized_pnl]
      properties:
        agent_id:
          type: string
        symbol:
          type: string
        net_qty:
          type: integer
        avg_cost:
          type: number
        realized_pnl:
          type: number
        unrealized_pnl:
          type: number
        updated_at:
          type: string
          format: date-time

    GetPositionsResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/PositionView'

    OrderTimelineItem:
      type: object
      required: [order_intent_id, symbol, side, qty, status, created_at]
      properties:
        order_intent_id:
          type: string
        symbol:
          type: string
        side:
          type: string
          enum: [BUY, SELL]
        qty:
          type: integer
        status:
          $ref: '#/components/schemas/OrderStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GetOrdersResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          type: object
          required: [items, page, size, total]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/OrderTimelineItem'
            page:
              type: integer
            size:
              type: integer
            total:
              type: integer

    PerformanceMetrics:
      type: object
      properties:
        realized_pnl:
          type: number
        unrealized_pnl:
          type: number
        turnover:
          type: number
        hit_ratio:
          type: number
          minimum: 0
          maximum: 1
        drawdown:
          type: number

    PerformanceSnapshot:
      type: object
      properties:
        snapshot_ts:
          type: string
          format: date-time
        mtm_price:
          type: number
        realized_pnl:
          type: number
        unrealized_pnl:
          type: number

    GetPerformanceResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          type: object
          required: [metrics, snapshots]
          properties:
            metrics:
              $ref: '#/components/schemas/PerformanceMetrics'
            snapshots:
              type: array
              items:
                $ref: '#/components/schemas/PerformanceSnapshot'

    ManualTradeEventRequest:
      type: object
      required: [idempotency_key, agent_id, instrument_id, side, qty, order_type, time_in_force, reason]
      properties:
        idempotency_key:
          type: string
        agent_id:
          type: string
        instrument_id:
          type: string
        side:
          type: string
          enum: [BUY, SELL]
        qty:
          type: integer
          minimum: 1
          maximum: 100
        order_type:
          type: string
          enum: [MKT, LMT, STP]
        time_in_force:
          type: string
          enum: [DAY, GTC]
        reason:
          type: string
        source_event_id:
          type: string
        metadata:
          type: object
          additionalProperties: true

    ExternalTradeEventRequest:
      type: object
      required: [integration_id, source_event_id, idempotency_key, agent_id, instrument_id, side, qty, order_type, time_in_force, reason]
      properties:
        integration_id:
          type: string
        source_event_id:
          type: string
        idempotency_key:
          type: string
        agent_id:
          type: string
        instrument_id:
          type: string
        side:
          type: string
          enum: [BUY, SELL]
        qty:
          type: integer
          minimum: 1
          maximum: 100
        order_type:
          type: string
          enum: [MKT, LMT, STP]
        time_in_force:
          type: string
          enum: [DAY, GTC]
        reason:
          type: string
        metadata:
          type: object
          additionalProperties: true

    TradeEventIntakeResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          type: object
          required: [ingress_event_id, accepted, received_at, status, forwarded_to]
          properties:
            ingress_event_id:
              type: string
            accepted:
              type: boolean
            received_at:
              type: string
              format: date-time
            status:
              type: string
              enum: [ACCEPTED, DUPLICATE]
            forwarded_to:
              type: string
              enum: [ingress-gateway-service]

    SystemHealthResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          type: object
          required: [status, services]
          properties:
            status:
              type: string
              enum: [UP, DEGRADED, DOWN]
            services:
              type: object
              additionalProperties:
                type: string

    ConsistencyStatusResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          type: object
          required: [trading_mode, unknown_order_count, reconciliation_state]
          properties:
            trading_mode:
              type: string
              enum: [NORMAL, FROZEN]
            unknown_order_count:
              type: integer
              minimum: 0
            reconciliation_state:
              type: string
              enum: [IDLE, RUNNING, FAILED, CLEAN]

    KillSwitchRequest:
      type: object
      required: [enabled, reason]
      properties:
        enabled:
          type: boolean
        reason:
          type: string

    KillSwitchResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          type: object
          required: [kill_switch, trading_mode, updated_at]
          properties:
            kill_switch:
              type: string
              enum: [ON, OFF]
            trading_mode:
              type: string
              enum: [NORMAL, FROZEN]
            updated_at:
              type: string
              format: date-time

    TradingModeRequest:
      type: object
      required: [mode, reason]
      properties:
        mode:
          type: string
          enum: [NORMAL, FROZEN]
        reason:
          type: string

    TradingModeResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          type: object
          required: [trading_mode, updated_at]
          properties:
            trading_mode:
              type: string
              enum: [NORMAL, FROZEN]
            updated_at:
              type: string
              format: date-time

    ReconciliationStartRequest:
      type: object
      required: [scope, reason]
      properties:
        scope:
          type: string
          enum: [ALL, ORDER, POSITION]
        reason:
          type: string

    ReconciliationStartResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          type: object
          required: [run_id, status]
          properties:
            run_id:
              type: string
            status:
              type: string
              enum: [STARTED]

    ReconciliationStatusResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          type: object
          required: [run_id, status]
          properties:
            run_id:
              type: string
            status:
              type: string
              enum: [STARTED, RUNNING, CLEAN, FAILED]
            mismatches:
              type: array
              items:
                type: object
                properties:
                  category:
                    type: string
                  count:
                    type: integer

    AckResumeRequest:
      type: object
      required: [comment]
      properties:
        comment:
          type: string

    OrderConsistencyResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          type: object
          required: [order_intent_id, state, broker_match]
          properties:
            order_intent_id:
              type: string
            state:
              type: string
            broker_match:
              type: string
              enum: [MATCHED, MISMATCHED, UNKNOWN]
            details:
              type: object
              additionalProperties: true

    InstrumentCreateRequest:
      type: object
      required: [instrument_id, symbol, asset_type, exchange, status]
      properties:
        instrument_id:
          type: string
        symbol:
          type: string
        asset_type:
          $ref: '#/components/schemas/AssetType'
        exchange:
          type: string
        status:
          $ref: '#/components/schemas/InstrumentStatus'
        multiplier:
          type: number
          description: Required for futures instruments.

    InstrumentStatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/InstrumentStatus'

    InstrumentView:
      type: object
      required: [instrument_id, symbol, asset_type, exchange, status]
      properties:
        instrument_id:
          type: string
        symbol:
          type: string
        asset_type:
          $ref: '#/components/schemas/AssetType'
        exchange:
          type: string
        status:
          $ref: '#/components/schemas/InstrumentStatus'
        multiplier:
          type: number

    InstrumentResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          $ref: '#/components/schemas/InstrumentView'

    InstrumentsResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          type: object
          required: [items, page, size, total]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/InstrumentView'
            page:
              type: integer
            size:
              type: integer
            total:
              type: integer

    ActiveContractResponse:
      type: object
      required: [trace_id, data]
      properties:
        trace_id:
          type: string
        data:
          type: object
          properties:
            instrument_id:
              type: string
            active_contract:
              type: string
            rollover_date:
              type: string
              format: date
