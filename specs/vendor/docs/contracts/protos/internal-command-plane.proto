syntax = "proto3";

package autotrading.command.v1;

option java_package = "com.autotrading.command.v1";
option java_multiple_files = true;

// Request context values are mirrored in transport metadata for tracing and idempotency.
message RequestContext {
  string trace_id = 1;
  string request_id = 2;
  string idempotency_key = 3;
  string principal_id = 4;
}

enum Decision {
  DECISION_UNSPECIFIED = 0;
  DECISION_ALLOW = 1;
  DECISION_DENY = 2;
}

enum FailureMode {
  FAILURE_MODE_UNSPECIFIED = 0;
  FAILURE_MODE_NONE = 1;
  FAILURE_MODE_OPA_TIMEOUT = 2;
  FAILURE_MODE_OPA_UNAVAILABLE = 3;
  FAILURE_MODE_OPA_SCHEMA_ERROR = 4;
  FAILURE_MODE_BUNDLE_LOAD_ERROR = 5;
}

enum CommandStatus {
  COMMAND_STATUS_UNSPECIFIED = 0;
  COMMAND_STATUS_ACCEPTED = 1;
  COMMAND_STATUS_REJECTED = 2;
  COMMAND_STATUS_DUPLICATE = 3;
  COMMAND_STATUS_FAILED = 4;
}

service RiskDecisionService {
  rpc EvaluateSignal(EvaluateSignalRequest) returns (EvaluateSignalResponse);
}

service OrderCommandService {
  rpc CreateOrderIntent(CreateOrderIntentRequest) returns (CreateOrderIntentResponse);
}

service BrokerCommandService {
  rpc SubmitOrder(SubmitOrderRequest) returns (SubmitOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc ReplaceOrder(ReplaceOrderRequest) returns (ReplaceOrderResponse);
}

message EvaluateSignalRequest {
  RequestContext request_context = 1;
  string agent_id = 2;
  string instrument_id = 3;
  string signal_id = 4;
  string side = 5;
  int64 qty = 6;
  string strategy_ts = 7;
  string order_type = 8;
  string time_in_force = 9;
  string reason = 10;
  string trade_event_id = 11;
  string raw_event_id = 12;
  string origin_source_type = 13;
  string origin_source_event_id = 14;
  string source_system = 15;
}

message EvaluateSignalResponse {
  string trace_id = 1;
  Decision decision = 2;
  repeated string deny_reasons = 3;
  string policy_version = 4;
  string policy_rule_set = 5;
  repeated string matched_rule_ids = 6;
  FailureMode failure_mode = 7;
}

message CreateOrderIntentRequest {
  RequestContext request_context = 1;
  string agent_id = 2;
  string instrument_id = 3;
  string signal_id = 4;
  Decision decision = 5;
  repeated string deny_reasons = 6;
  string policy_version = 7;
  string side = 8;
  int64 qty = 9;
  string order_type = 10;
  string time_in_force = 11;
  string policy_rule_set = 12;
  repeated string matched_rule_ids = 13;
  FailureMode failure_mode = 14;
  string trade_event_id = 15;
  string raw_event_id = 16;
  string origin_source_type = 17;
  string origin_source_event_id = 18;
}

message CreateOrderIntentResponse {
  string trace_id = 1;
  CommandStatus status = 2;
  string order_intent_id = 3;
  repeated string reasons = 4;
}

message SubmitOrderRequest {
  RequestContext request_context = 1;
  string agent_id = 2;
  string instrument_id = 3;
  string order_intent_id = 4;
  string side = 5;
  int64 qty = 6;
  string order_type = 7;
  string time_in_force = 8;
  int64 submission_deadline_ms = 9;
}

message SubmitOrderResponse {
  string trace_id = 1;
  CommandStatus status = 2;
  string broker_submit_id = 3;
  string submitted_at = 4;
}

message CancelOrderRequest {
  RequestContext request_context = 1;
  string agent_id = 2;
  string order_intent_id = 3;
  string reason = 4;
}

message CancelOrderResponse {
  string trace_id = 1;
  CommandStatus status = 2;
  string broker_cancel_id = 3;
}

message ReplaceOrderRequest {
  RequestContext request_context = 1;
  string agent_id = 2;
  string order_intent_id = 3;
  int64 new_qty = 4;
  string new_limit_price = 5;
  string reason = 6;
}

message ReplaceOrderResponse {
  string trace_id = 1;
  CommandStatus status = 2;
  string broker_replace_id = 3;
}
