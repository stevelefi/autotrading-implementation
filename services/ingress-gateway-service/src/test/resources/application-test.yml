spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/autotrading}
    username: ${SPRING_DATASOURCE_USERNAME:autotrading}
    password: ${SPRING_DATASOURCE_PASSWORD:autotrading}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      auto-offset-reset: earliest
    producer:
      acks: all

logging:
  level:
    com.autotrading: DEBUG
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN

