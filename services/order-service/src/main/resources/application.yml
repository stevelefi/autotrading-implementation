server:
  port: ${SERVER_PORT:8080}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9092}

broker:
  grpc:
    host: ${BROKER_GRPC_HOST:ibkr-connector-service}
    port: ${BROKER_GRPC_PORT:9093}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
