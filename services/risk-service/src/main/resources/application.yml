server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: risk-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/autotrading}
    username: ${SPRING_DATASOURCE_USERNAME:autotrading}
    password: ${SPRING_DATASOURCE_PASSWORD:autotrading}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 3000
      validation-timeout: 1000
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: risk-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}

order:
  grpc:
    host: ${ORDER_GRPC_HOST:order-service}
    port: ${ORDER_GRPC_PORT:9090}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      service: ${spring.application.name}

autotrading:
  kafka:
    publish-timeout-ms: 500   # single-attempt timeout; DirectKafkaPublisher retries within 5s total
  outbox:
    poller:
      enabled: false

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%5p service=${spring.application.name} trace_id=%X{trace_id:-} request_id=%X{request_id:-} idempotency_key=%X{idempotency_key:-} principal_id=%X{principal_id:-} agent_id=%X{agent_id:-} signal_id=%X{signal_id:-} order_intent_id=%X{order_intent_id:-} instrument_id=%X{instrument_id:-} [%thread] %logger - %msg%n"

qa:
  api:
    enabled: false
